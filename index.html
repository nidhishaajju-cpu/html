<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docu</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(to bottom, #ff758c, #ff7eb3);
    text-align:center;
    color:white;
    font-family:Arial;
}

/* Text */
h1{
    margin-top:100px;
    font-size:50px;
}

h2{
    font-size:28px;
}

/* Heart Button */
.heart-btn{
    background:none;
    border:none;
    font-size:70px;
    cursor:pointer;
    animation:heartbeat 1s infinite;
}

/* Button Animation */
@keyframes heartbeat{
    0%{transform:scale(1);}
    25%{transform:scale(1.2);}
    50%{transform:scale(1);}
    75%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

/* Floating Hearts */
.heart{
    position:absolute;
    color:white;
    font-size:30px;
    animation:float 6s linear infinite;
}

/* Heart Movement */
@keyframes float{
    0%{
        transform:translateY(100vh) scale(1);
        opacity:1;
    }

    100%{
        transform:translateY(-100vh) scale(1.5);
        opacity:0;
    }
}

</style>
</head>

<body>

<h1>Hi Praveen ❤️</h1>
<h2>Heart ah click panavum enai pidithaal</h2>

<!-- Heart Button -->
<button class="heart-btn" onclick="openPage()">❤️</button>

<!-- Floating Hearts -->
<div class="heart" style="left:10%; animation-delay:0s;">❤️</div>
<div class="heart" style="left:30%; animation-delay:2s;">❤️</div>
<div class="heart" style="left:50%; animation-delay:4s;">❤️</div>
<div class="heart" style="left:70%; animation-delay:1s;">❤️</div>
<div class="heart" style="left:90%; animation-delay:3s;">❤️</div>

<script>

function openPage() {
    window.location.href = "page2.html";
}

</script>

</body>
</html>
